version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output:ro

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8010
    depends_on:
      - api